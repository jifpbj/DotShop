<!-- login.component.html -->
<!-- The card wrapper centres the form on the page -->
<div class="login-card">

  <!-- Title changes dynamically based on the current mode -->
  <h2>{{ isRegisterMode ? 'Create Account' : 'Sign In' }}</h2>

  <!-- Register-only fields — hidden in login mode using *ngIf -->
  <ng-container *ngIf="isRegisterMode">
    <div class="form-group">
      <label>First Name</label>
      <!-- [(ngModel)] is two-way binding: typing updates the component property,
           and setting the property programmatically updates the input value. -->
      <input type="text" [(ngModel)]="firstName" placeholder="Jane" />
    </div>
    <div class="form-group">
      <label>Last Name</label>
      <input type="text" [(ngModel)]="lastName" placeholder="Doe" />
    </div>
  </ng-container>

  <!-- Shared fields (both modes) -->
  <div class="form-group">
    <label>Email</label>
    <input type="email" [(ngModel)]="email" placeholder="jane@example.com" />
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" [(ngModel)]="password" placeholder="••••••••" />
  </div>

  <!-- (click) binds a DOM click event to the component's submit() method -->
  <button class="btn-primary" (click)="submit()">
    {{ isRegisterMode ? 'Register' : 'Login' }}
  </button>

  <!-- Show error message from the API if present -->
  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <!-- Link to toggle between login and register -->
  <div class="toggle-link">
    <span *ngIf="!isRegisterMode">
      No account? <a (click)="toggleMode()">Register here</a>
    </span>
    <span *ngIf="isRegisterMode">
      Already have an account? <a (click)="toggleMode()">Sign in</a>
    </span>
  </div>

</div>
